<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu resumen semanal · Y Altoque</title>
<meta name="robots" content="noindex">
<style>
  :root{--bg:#04141a;--surface:#0b2129;--border:#16323b;--teal:#2fe6a8;--gold:#ecbc4e;
        --text:#e7f3f0;--muted:#8fb0aa}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);
       color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}
  .card{max-width:440px;width:100%;text-align:center;background:var(--surface);border:1px solid var(--border);
        border-radius:22px;padding:40px 28px}
  .logo{font-size:1.5rem;font-weight:800;margin-bottom:18px}
  .logo .y{color:var(--gold)}
  .emoji{font-size:2.6rem;margin-bottom:10px}
  h1{font-size:1.35rem;margin-bottom:10px}
  p{color:var(--muted);line-height:1.55;margin-bottom:22px;font-size:.95rem}
  .btns{display:flex;flex-direction:column;gap:10px}
  a.btn{display:block;text-decoration:none;font-weight:700;border-radius:12px;padding:13px 18px;transition:filter .15s}
  a.btn:hover{filter:brightness(1.08)}
  a.primary{background:var(--teal);color:#04141a}
  a.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .small{margin-top:18px;font-size:.8rem;color:var(--muted)}
  .small a{color:var(--teal);text-decoration:none}
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="y">Y</span> Altoque</div>
    <div class="emoji">📊</div>
    <h1>Abre tu resumen en la app</h1>
    <p>Si tienes <strong>Y Altoque</strong> instalada, este enlace la abre directo.
       ¿No se abrió sola? Descárgala o ábrela desde tu celular.</p>
    <div class="btns">
      <a class="btn primary" href="https://apps.apple.com/app/id6778281655">Descargar en App Store</a>
      <a class="btn primary" href="https://play.google.com/store/apps/details?id=com.erikgbs.finance_app">Descargar en Google Play</a>
      <a class="btn ghost" href="https://yaltoque.com">Ir a yaltoque.com</a>
    </div>
    <p class="small">¿Dudas? Escríbenos por <a href="https://yaltoque.com">la web</a>.</p>
  </div>
</body>
</html>
